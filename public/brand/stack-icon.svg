<!-- THE COMPOUND SYSTEM — Icon
     Geometry: bar height = 1u, gaps = 0.5u, widths = 5u / 8u / 13u
     Viewbox chosen so 1u = 20, mark width = 13u = 260, mark height = 3u + 2*(0.5u) = 4u = 80
     With 1u padding on all sides: total = 300 x 120
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" role="img" aria-label="The Compound System">
  <!-- Top bar: 5u wide = 100, centered -->
  <rect x="100" y="20" width="100" height="20" fill="#BF9A62"/>
  <!-- Middle bar: 8u wide = 160, centered -->
  <rect x="70"  y="50" width="160" height="20" fill="#BF9A62"/>
  <!-- Bottom bar: 13u wide = 260, centered -->
  <rect x="20"  y="80" width="260" height="20" fill="#BF9A62"/>
</svg>
